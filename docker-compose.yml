services:
  postgres:
    image: postgres:17-alpine
    container_name: indeklimaguiden-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: indeklimaguiden
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d indeklimaguiden"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
