<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Registreret hos Indeklimaguiden.dk badge</title>
  <desc id="desc">Et simpelt kvadratisk SVG-badge med Indeklimaguiden-logo, tekst og registreringsmarkering.</desc>

  <defs>
    <linearGradient id="blueStroke" x1="122" y1="130" x2="390" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00416c"/>
      <stop offset="1" stop-color="#006a9d"/>
    </linearGradient>
    <linearGradient id="leafGreen" x1="210" y1="210" x2="310" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8ccd3a"/>
      <stop offset="1" stop-color="#62af2e"/>
    </linearGradient>
    <linearGradient id="waveBlue" x1="110" y1="330" x2="402" y2="386" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#008fc8"/>
      <stop offset="0.55" stop-color="#00a3dc"/>
      <stop offset="1" stop-color="#55bfe5"/>
    </linearGradient>
  </defs>

  <rect x="18" y="18" width="476" height="476" rx="42" fill="#ffffff"/>
  <rect x="18" y="18" width="476" height="476" rx="42" fill="none" stroke="#d9edf6" stroke-width="6"/>
  <rect x="34" y="34" width="444" height="444" rx="30" fill="none" stroke="#eef7fb" stroke-width="2"/>

  <text x="256" y="74" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" letter-spacing="2.5" fill="#00416c">REGISTRERET HOS</text>

  <g transform="translate(0 -8)">
    <!-- House outline -->
    <path d="M143 237 L143 203 L256 103 L369 203 L369 237" fill="none" stroke="url(#blueStroke)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M151 237 L151 294" fill="none" stroke="#004f80" stroke-width="22" stroke-linecap="butt"/>
    <path d="M361 237 L361 294" fill="none" stroke="#004f80" stroke-width="22" stroke-linecap="butt"/>

    <!-- Leaf -->
    <path d="M204 297 C195 244 220 210 259 196 C289 185 315 184 337 163 C337 211 321 255 288 281 C263 301 231 305 204 297 Z" fill="url(#leafGreen)"/>
    <path d="M196 319 C209 276 235 240 280 209" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    <path d="M194 320 C202 291 214 266 231 244" fill="none" stroke="#6bbf32" stroke-width="8" stroke-linecap="round"/>

    <!-- Waves -->
    <path d="M82 344 C145 315 189 325 238 349 C286 373 333 369 411 333 C369 332 335 342 304 356 C264 374 225 374 185 357 C150 342 117 338 82 344 Z" fill="url(#waveBlue)"/>
    <path d="M204 331 C249 335 280 315 314 303 C345 292 377 293 414 304 C359 307 328 336 288 348 C257 358 232 350 204 331 Z" fill="#00a2db"/>
    <path d="M284 395 C321 391 349 373 383 357 C414 342 442 340 471 354 C426 359 395 386 354 397 C329 404 306 402 284 395 Z" fill="#58bee3"/>
  </g>

  <g transform="translate(256 426)">
    <circle cx="0" cy="0" r="16" fill="#72bf34"/>
    <path d="M-7 0 L-2 6 L9 -7" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="256" y="466" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800" letter-spacing="1.2" fill="#00416c">INDEKLIMAGUIDEN.DK</text>
</svg>
